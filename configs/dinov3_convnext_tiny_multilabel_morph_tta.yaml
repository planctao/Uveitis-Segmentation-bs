project:
  name: uveitis_dinov3_convnext_tiny_morph_tta
  seed: 42

runtime:
  device: cuda
  precision: amp
  num_workers: 8

data:
  root: dataset/dataset/split_dataorigin
  image_dir: img
  mask_dir: mask_only_itksnap
  hrnet_result_dir: HRNet_Result
  image_extensions: [.jpg, .jpeg, .png, .bmp, .tif, .tiff]
  mask_extensions: [.nii.gz, .nii, .png, .jpg, .jpeg, .bmp, .tif, .tiff]
  result_extensions: [.png, .jpg, .jpeg, .bmp, .tif, .tiff]
  folds: [f1, f2, f3, f4, f5]
  label_values: [0, 1, 2, 3]
  ignore_index: 255

train:
  image_size: [768, 768]
  batch_size: 8
  grad_accum_steps: 1
  epochs: 30
  learning_rate: 0.0001
  backbone_learning_rate: 0.00001
  min_learning_rate: 0.0000001
  scheduler: cosine
  weight_decay: 0.0001
  freeze_backbone: false
  amp: true
  clip_grad_norm: 1.0
  progress_log_interval: 50
  save_interval: 5
  sample_interval: 5
  ema_enabled: false
  ema_decay: 0.999
  ema_start_epoch: 1
  lesion1_sample_weight: 1.0
  lesion2_sample_weight: 6.0
  sampler_epoch_multiplier: 1.0
  max_train_samples:
  max_val_samples:
  folds_to_run: [f1, f2, f3, f4, f5]

model:
  backbone: dinov3_convnext_tiny
  variant: tiny
  dinov3_code_dir: backbone/dinov3
  backbone_weights: weights/dinov3_convnext_tiny_pretrain_lvd1689m-21b726bb.pth
  decoder_channels: 192
  decoder_attention: none
  decoder_attention_reduction: 16
  decoder_deep_supervision: false
  aux_loss_weight: 0.4
  num_outputs: 2

loss:
  pos_weight: [3.0, 60.0]
  bce_weight: 0.5
  tversky_weight: 1.0
  tversky_alpha: 0.2
  tversky_beta: 0.8
  focal_gamma: 0.75
  boundary_weight: 0.0
  boundary_kernel: 5
  boundary_dice_weight: 0.0
  boundary_dice_kernel: 5
  hard_negative_ratio: 0.0
  hard_negative_min_pixels: 0

preprocess:
  enabled: false
  mode: fa_lce
  channel_reduce: max
  kernel_size: 31
  strength: 0.35
  quantile: 0.99
  reference_threshold: 0.03

metric:
  threshold: [0.50, 0.90]
  threshold_sweep:
    enabled: true
    postprocess: false
    fov_mask: false
    thresholds: [0.05, 0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40, 0.45, 0.50, 0.60, 0.70, 0.80, 0.90]
  tta:
    enabled: true
    flips: [h, v, hv]
    scales: [1.0]
    size_multiple: 32
    uncertainty_penalty: [0.0, 0.0]
    appearance_preprocess:
      enabled: false
      mode: fa_lce
      channel_reduce: max
      kernel_size: 31
      strength: 0.25
      quantile: 0.99
      reference_threshold: 0.03
  adaptive_threshold:
    enabled: false
    method: quantile
    quantile: [0.0, 0.0]
    blend: [1.0, 1.0]
    min_threshold: [0.0, 0.0]
    max_threshold: [1.0, 1.0]
  postprocess:
    enabled: true
    close_kernel: [3, 3]
    open_kernel: [0, 0]
    hysteresis_seed_threshold: [0.0, 0.0]
    hysteresis_min_seed_pixels: [1, 1]
    min_component_area: [64, 16]
    small_component_min_mean_prob: [0.0, 0.0]
    small_component_min_max_prob: [0.0, 0.0]
    min_component_mean_prob: [0.0, 0.0]
    min_component_prob_mass: [0.0, 0.0]
    max_component_aspect_ratio: [0.0, 0.0]
    min_component_extent: [0.0, 0.0]
    lesion2_support_dilation_kernel: 0
    lesion2_min_support_pixels: 0
    lesion2_min_support_fraction: 0.0
    lesion2_support_threshold: 0.0
    max_components: [0, 0]
    component_score: area
    fill_holes_max_area: [128, 64]
    connectivity: 8
  intensity_refine:
    enabled: false
    input_mode: imagenet
    channel_reduce: max
    reference_threshold: 0.03
    min_component_mean_intensity: [0.0, 0.0]
    min_component_max_intensity: [0.0, 0.0]
    min_component_mean_quantile: [0.0, 0.0]
    min_component_max_quantile: [0.0, 0.0]
    contrast_kernel: 0
    min_component_mean_contrast: [0.0, 0.0]
    min_component_max_contrast: [0.0, 0.0]
    min_component_mean_contrast_quantile: [0.0, 0.0]
    min_component_max_contrast_quantile: [0.0, 0.0]
    rescue_min_mean_prob: [0.0, 0.0]
    rescue_min_max_prob: [0.0, 0.0]
    connectivity: 8
  fov_mask:
    enabled: true
    input_mode: imagenet
    threshold: 0.03
    channel_reduce: max
    close_kernel: 15
    open_kernel: 0
    erode_kernel: 0
    min_component_area: 4096
    fill_holes_max_area: 262144
    keep_largest: true
    fallback_full_if_empty: true
    border_erode_kernel: 0
    border_min_inner_pixels: [0, 0]
    border_min_inner_fraction: [0.0, 0.0]
    border_rescue_min_mean_prob: [0.0, 0.0]
    border_rescue_min_max_prob: [0.0, 0.0]
    connectivity: 8

augmentations:
  enabled: true
  pipeline:
    - name: hflip
      prob: 0.5
    - name: vflip
      prob: 0.2
    - name: affine
      prob: 0.8
      strength: 1.0
      degrees: [-25, 25]
      scale: [0.9, 1.1]
      translate: 0.04
    - name: foreground_resized_crop
      prob: 0.25
      strength: 1.0
      scale: [0.88, 1.0]
      foreground_labels: [1, 2, 3]
      ignore_index: 255
      min_keep: 0.7
      attempts: 8
    - name: random_order
      prob: 1.0
      blocks:
        - name: brightness_contrast
          prob: 0.55
          strength: 0.75
          brightness: [-0.1, 0.1]
          contrast: [0.85, 1.2]
        - name: gamma
          prob: 0.35
          strength: 0.75
          gamma: [0.8, 1.25]
    - name: one_of
      prob: 0.25
      weights: [0.7, 0.3]
      blocks:
        - name: gaussian_noise
          prob: 1.0
          strength: 0.75
          std: [0.0, 0.025]
        - name: gaussian_blur
          prob: 1.0
          strength: 0.75
          kernel_size: 5
          sigma: [0.2, 0.8]

outputs:
  root: runs
