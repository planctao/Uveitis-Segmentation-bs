project:
  name: uveitis_segmentation
  seed: 42

runtime:
  device: cuda
  precision: amp
  num_workers: 8

data:
  root: dataset/dataset/split_dataorigin
  image_dir: img
  mask_dir: mask
  hrnet_result_dir: HRNet_Result
  folds: [f1, f2, f3, f4, f5]
  image_extensions: [.jpg, .jpeg, .png, .bmp, .tif, .tiff]
  mask_extensions: [.nii.gz, .nii, .png, .jpg, .jpeg, .bmp, .tif, .tiff]
  result_extensions: [.png, .jpg, .jpeg, .bmp, .tif, .tiff]
  train_folds: [f1, f2, f3, f4]
  val_folds: [f5]
  label_values: [0, 1, 2, 3]
  ignore_index: 255
  paper_metric:
    lesion_1_values: [1, 3]
    lesion_2_values: [2, 3]

train:
  image_size: [768, 768]
  batch_size: 1
  grad_accum_steps: 4
  epochs: 40
  learning_rate: 0.0001
  backbone_learning_rate: 0.00001
  weight_decay: 0.0001
  freeze_backbone: true
  unfreeze_last_blocks: 0
  amp: true
  clip_grad_norm: 1.0
  log_interval: 20
  progress_log_interval: 200
  val_interval: 1
  save_interval: 5
  max_train_samples:
  max_val_samples:

model:
  backbone: dinov3_vitb16
  dinov3_code_dir: backbone/dinov3
  backbone_weights: weights/dinov3_vitb16_pretrain_lvd1689m-73cec8be.pth
  intermediate_layers: [2, 5, 8, 11]
  embed_dim: 768
  decoder_channels: 256
  num_classes: 4
  dropout: 0.1

loss:
  ce_weight: 1.0
  dice_weight: 1.0
  class_weights: [0.2, 2.0, 4.0, 8.0]
  dice_include_background: false

outputs:
  root: runs
  checkpoint_dir: runs/checkpoints
  log_dir: runs/logs
